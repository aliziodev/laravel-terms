name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*']
        exclude:
          - php: '8.2'
            laravel: '12.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-update --no-interaction
          composer update --prefer-dist --no-interaction --no-progress

      - name: Check code style
        if: matrix.php == '8.3' && matrix.laravel == '11.*'
        run: vendor/bin/pint --test

      - name: Run tests with coverage
        if: matrix.php == '8.3' && matrix.laravel == '11.*'
        run: vendor/bin/pest --coverage --coverage-clover=coverage.xml

      - name: Run tests
        if: matrix.php != '8.3' || matrix.laravel != '11.*'
        run: vendor/bin/pest

      - name: Upload coverage
        if: matrix.php == '8.3' && matrix.laravel == '11.*'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
